version: v2

modules:
  - path: .
    name: buf.build/josephgoksu/taskwing

lint:
  use:
    - STANDARD
  except:
    # Allow request/response suffix instead of requiring service-specific prefixes
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    # Allow shared request/response types for unary + streaming RPC variants
    - RPC_REQUEST_RESPONSE_UNIQUE

breaking:
  use:
    - FILE
